name: Notify Downstream

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    runs-on: [self-hosted, node-b]
    name: Create update issues
    steps:
      - name: Create issues in downstream repos
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY##*/}"

          for DOWNSTREAM in AusAgentSmith-org/rustTorrent AusAgentSmith-org/StackArr AusAgentSmith-org/NGMS; do
            EXISTING=$(gh issue list --repo "$DOWNSTREAM" --search "Update ${REPO} to ${TAG}" --state open --json number --jq 'length' 2>/dev/null || echo "0")
            if [ "$EXISTING" != "0" ]; then
              echo "Issue already exists in ${DOWNSTREAM}, skipping"
              continue
            fi

            gh issue create \
              --repo "$DOWNSTREAM" \
              --title "Update ${REPO} to ${TAG}" \
              --body "$(cat <<EOF
          A new version of [\`${REPO}\`](https://github.com/${GITHUB_REPOSITORY}) has been tagged: **${TAG}**

          ## Action Required
          Update \`Cargo.toml\` to reference the new tag:
          \`\`\`toml
          ${REPO} = { git = "https://github.com/${GITHUB_REPOSITORY}.git", tag = "${TAG}" }
          \`\`\`

          ---
          *Auto-generated by [notify-downstream](https://github.com/${GITHUB_REPOSITORY}/actions) workflow*
          EOF
            )" || echo "Warning: Could not create issue in ${DOWNSTREAM}"
          done
